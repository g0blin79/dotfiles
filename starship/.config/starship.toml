"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
$directory\
$git_branch\
$git_commit\
$git_status\
$package\
$nodejs\
$bun\
$deno\
$php\
$python\
$golang\
$java\
$gradle\
$lua\
$container\
$cmd_duration\
$status\
$line_break\
$os$character"""

[directory]
truncation_length = 3
truncate_to_repo = true
read_only = " ¾░î¥"

[git_branch]
symbol = "´Éÿ "

[git_commit]
tag_symbol = " ´ÉÆ "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold yellow"
conflicted = "=${count}"
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
untracked = "?${count}"
stashed = "\\$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "┬╗${count}"
deleted = "Ô£ÿ${count}"

[status]
disabled = false
symbol = "´æº "
format = "[$symbol$status]($style) "
style = "bold red"

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold yellow"

[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"
vimcmd_symbol = "[ÔØ«](bold green)"

[os]
disabled = false
format = "[$symbol]($style) "
style = "bold bright-blue"

[container]
