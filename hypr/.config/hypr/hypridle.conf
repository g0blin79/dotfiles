general {
    lock_cmd = hyprlock
    unlock_cmd = notify-send "Unlocked"
}

listener {
    timeout = 600
    on-timeout = hyprlock
}

listener {
    timeout = 1800
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 3600
    on-timeout = systemctl suspend
}

