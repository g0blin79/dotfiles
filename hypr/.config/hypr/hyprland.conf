# Shared Hyprland entrypoint.
# Machine-specific monitor/workspace setup is selected by ~/.config/hypr/machine.conf.

source = ~/.config/hypr/conf.d/env.conf
source = ~/.config/hypr/dms/cursor.conf
source = ~/.config/hypr/conf.d/autostart.conf
source = ~/.config/hypr/conf.d/input.conf
source = ~/.config/hypr/conf.d/appearance.conf
source = ~/.config/hypr/conf.d/binds.conf
source = ~/.config/hypr/conf.d/windowrules.conf
source = ~/.config/hypr/conf.d/workspaces.conf

source = ~/.config/hypr/machine.conf
source = ~/.config/hypr/local.conf
