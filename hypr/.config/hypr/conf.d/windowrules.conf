# Shared window rules.

windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = float-kcalc
    match:class = ^(org.kde.kcalc)$
    float = on
    size = 420 480
    center = on
}

windowrule {
    name = float-dolphin
    match:class = ^(org.kde.dolphin)$
    size = 1000 800
    center = on
    float = on
}

windowrule {
    name = float-gwenview
    match:class = ^(org.kde.gwenview)$
    size = 1200 1000
    center = on
    float = on
}

windowrule {
    name = float-okular
    match:class = ^(org.kde.okular)$
    size = 1200 1000
    center = on
    float = on
}

windowrule {
    name = float-thunar
    match:class = ^(thunar)$
    size = 1000 800
    center = on
    float = on
}

windowrule {
    name = float-blueman
    match:class = ^(blueman-manager)$
    size = 1000 800
    center = on
    float = on
}

windowrule {
    name = dms-windows-floating
    match:class = ^(org.quickshell)$
    float = on
    center = on
}
