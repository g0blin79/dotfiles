# Shared Hyprland autostart.

# TODO: ~/.local/bin/xdg-portal-switch is not versioned in this repo.
# Keep that script installed locally, or disable this line on machines that do not have it.
exec-once = sh -lc 'test -x ~/.local/bin/xdg-portal-switch && ~/.local/bin/xdg-portal-switch hyprland || true'
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE XDG_MENU_PREFIX QT_QPA_PLATFORM QT_QPA_PLATFORMTHEME KDE_SESSION_VERSION
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = hypridle
exec-once = dms run
exec-once = solaar --window=hide

